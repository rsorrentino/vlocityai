version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
            environment:
              - NODE_ENV=production
              - PORT=3001
              - DATABASE_URL=postgresql://postgres:password@postgres:5432/vlocity_manager
              - REDIS_URL=redis://redis:6379
              - JWT_SECRET=your-production-jwt-secret-change-this
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    restart: unless-stopped

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vlocity_manager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
    restart: unless-stopped

        volumes:
          postgres_data:
          redis_data:
