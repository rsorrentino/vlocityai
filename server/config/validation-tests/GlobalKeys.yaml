# Validate that all key Vlocity objects have a GlobalKey set.
# Records without a GlobalKey cannot be reliably exported, deployed,
# or matched across orgs.

GlobalKeys:
  tests:
    - name: Product2MissingGlobalKey
      description: Active products without a Global Key cannot be exported/deployed reliably
      query: |
        SELECT Id, Name, ProductCode
        FROM Product2
        WHERE vlocity_cmt__GlobalKey__c = null
        AND IsActive = true
      validation:
        expect_empty:
          check_name: Product2MissingGlobalKey
          success_message: All active products have a Global Key
      severity: error

    - name: PriceListMissingGlobalKey
      description: Active Price Lists without a Global Key cannot be exported/deployed reliably
      query: |
        SELECT Id, Name, vlocity_cmt__Code__c
        FROM vlocity_cmt__PriceList__c
        WHERE vlocity_cmt__GlobalKey__c = null
        AND vlocity_cmt__IsActive__c = true
      validation:
        expect_empty:
          check_name: PriceListMissingGlobalKey
          success_message: All active Price Lists have a Global Key
      severity: error

    - name: PriceListEntryMissingGlobalKey
